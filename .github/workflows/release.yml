name: Release

# Runs semantic-release on every push to main. It inspects commits since the
# last release (Conventional Commits — see VERSIONING.md), decides the next
# version, updates CHANGELOG.md + both package.json files, tags the commit,
# and publishes a GitHub Release. Its own release commit is tagged
# "[skip ci]" so it doesn't re-trigger this workflow.
#
# No manual version input and no release PR — if the latest commits don't
# warrant a release (e.g. only docs/chore), semantic-release exits without
# doing anything.

on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.3

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx semantic-release
